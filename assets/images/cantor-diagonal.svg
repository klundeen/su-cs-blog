<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
<style>
  text { fill: #1a1a1a; }
  .label { font-size: 12px; fill: #767676; }
  .digit { font-size: 14px; fill: #1a1a1a; }
  .bold { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .heading { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .diag-box { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .diag-text { font-size: 14px; font-weight: 500; fill: #712B13; }
  .result-box { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .result-text { font-size: 14px; font-weight: 500; fill: #085041; }
  .conclusion-box { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .conclusion-text { font-size: 14px; font-weight: 500; fill: #3C3489; }
  @media (prefers-color-scheme: dark) {
    text { fill: #d4d4d4; }
    .label { fill: #9a9a9a; }
    .digit { fill: #d4d4d4; }
    .bold { fill: #e0e0e0; }
    .heading { fill: #e0e0e0; }
    .diag-box { fill: #712B13; stroke: #F0997B; }
    .diag-text { fill: #FAECE7; }
    .result-box { fill: #085041; stroke: #5DCAA5; }
    .result-text { fill: #E1F5EE; }
    .conclusion-box { fill: #3C3489; stroke: #AFA9EC; }
    .conclusion-text { fill: #EEEDFE; }
  }
</style>

<text class="heading" x="40" y="36">Cantor's diagonal argument</text>
<text class="label" x="40" y="56">Suppose you could list all real numbers between 0 and 1...</text>

<g transform="translate(60,80)">
  <text class="label" x="-20" y="20" text-anchor="end">r₁ =</text>
  <text class="label" x="-20" y="52" text-anchor="end">r₂ =</text>
  <text class="label" x="-20" y="84" text-anchor="end">r₃ =</text>
  <text class="label" x="-20" y="116" text-anchor="end">r₄ =</text>
  <text class="label" x="-20" y="148" text-anchor="end">r₅ =</text>

  <text class="digit" x="0" y="20">0 .</text>
  <text class="digit" x="0" y="52">0 .</text>
  <text class="digit" x="0" y="84">0 .</text>
  <text class="digit" x="0" y="116">0 .</text>
  <text class="digit" x="0" y="148">0 .</text>

  <rect class="diag-box" x="36" y="6" width="28" height="28" rx="4"/>
  <text class="diag-text" x="50" y="24" text-anchor="middle">5</text>
  <text class="digit" x="78" y="20">1  7  0  3  ...</text>

  <text class="digit" x="50" y="52">3</text>
  <rect class="diag-box" x="64" y="38" width="28" height="28" rx="4"/>
  <text class="diag-text" x="78" y="56" text-anchor="middle">8</text>
  <text class="digit" x="106" y="52">2  4  1  ...</text>

  <text class="digit" x="50" y="84">7  2</text>
  <rect class="diag-box" x="92" y="70" width="28" height="28" rx="4"/>
  <text class="diag-text" x="106" y="88" text-anchor="middle">9</text>
  <text class="digit" x="134" y="84">5  8  ...</text>

  <text class="digit" x="50" y="116">4  0  6</text>
  <rect class="diag-box" x="120" y="102" width="28" height="28" rx="4"/>
  <text class="diag-text" x="134" y="120" text-anchor="middle">1</text>
  <text class="digit" x="162" y="116">7  ...</text>

  <text class="digit" x="50" y="148">8  6  3  4</text>
  <rect class="diag-box" x="148" y="134" width="28" height="28" rx="4"/>
  <text class="diag-text" x="162" y="152" text-anchor="middle">2</text>
  <text class="digit" x="190" y="148">...</text>

  <text class="label" x="-20" y="180" text-anchor="end" opacity="0.5">⋮</text>
</g>

<g transform="translate(340,100)">
  <text class="heading" x="0" y="0">The diagonal: 5, 8, 9, 1, 2, ...</text>
  <text class="label" x="0" y="24">Now change every digit:</text>
  <text class="label" x="0" y="48">5→6, 8→9, 9→0, 1→2, 2→3</text>

  <rect class="result-box" x="0" y="64" width="260" height="44" rx="8"/>
  <text class="result-text" x="130" y="90" text-anchor="middle">New number: 0.69023...</text>

  <text class="label" x="0" y="136">It differs from r₁ in the 1st digit.</text>
  <text class="label" x="0" y="156">It differs from r₂ in the 2nd digit.</text>
  <text class="label" x="0" y="176">It differs from rₙ in the nth digit.</text>

  <rect class="conclusion-box" x="0" y="196" width="260" height="44" rx="8"/>
  <text class="conclusion-text" x="130" y="222" text-anchor="middle">It's not on the list.</text>
</g>

<text class="label" x="340" y="348">No list can contain all reals. The reals are a bigger infinity.</text>
</svg>
